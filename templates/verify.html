<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify a Signature</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
        h1 { text-align: center; }
        .flash { padding: 10px; border-radius: 6px; margin-bottom: 15px; }
        .success { background-color: #d4edda; color: #155724; }
        .danger { background-color: #f8d7da; color: #721c24; }
        form { display: flex; flex-direction: column; gap: 10px; }
        input[type=file] { padding: 5px; }
        button { padding: 8px 12px; cursor: pointer; }
        a { text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
    <h1>Verify a File Signature</h1>

    <!-- Display flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}"><strong>{{ message }}</strong></div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('verify') }}" enctype="multipart/form-data">
        <label for="file">Select Original File:</label>
        <input type="file" name="file" id="file" required>

        <label for="signature">Select Signature File (.sig):</label>
        <input type="file" name="signature" id="signature" required>

        <button type="submit">Verify Signature</button>
    </form>

    <br>
    <a href="{{ url_for('index') }}">Back to Home</a>
</body>
</html>
